<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
      {namespace core=TYPO3\CMS\Core\ViewHelpers}
      {namespace be=TYPO3\CMS\Backend\ViewHelpers}

<f:layout name="Module"/>

<f:section name="Content">

    <div class="row">
        <div class="col-12">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <label class="panel-title fw-bold">
                        <core:icon identifier="actions-translate" />
                        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.header"/>
                    </label>
                </div>
                <div class="panel-body">
                    <form method="POST" action="{f:be.uri(route: 'ai_suite_agencies_validate_xlf')}" name="input" enctype="multipart/form-data" class="with-spinner">
                        <f:render partial="Libs/SelectTextGenerationLibrary" arguments="{textGenerationLibraries: textGenerationLibraries, paidRequestsAvailable: paidRequestsAvailable}" />
                        <div class="form-group">
                            <label class="fw-bold mb-2" for="extensionKey">
                                <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.insertExtKey"/>
                            </label>
                            <input type="text" name="extensionKey" class="form-control" required="required" id="translateXlf-insertExtKey"/>
                        </div>
                        <div class="form-group">
                            <label class="fw-bold mb-2" for="filename">
                                <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.fileName"/>
                            </label>
                            <input type="text" name="filename" class="form-control" placeholder="{f:translate(key: 'LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.fileNamePlaceholder')}" required="required" id="translateXlf-fileName"/>
                        </div>
                        <label class="fw-bold mb-2">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang.xlf:aiSuite.selectSysLanguage"/>
                        </label>
                        <f:render partial="Libs/SearchableDropdown" arguments="{
                            searchableList: allLanguagesList,
                            translateKeyButton: 'LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.destinationLang',
                            propertyName: 'destinationLanguage'
                        }" />
                        <div class="form-group">
                            <label class="fw-bold mb-2">
                                <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.translationMode.label"/>
                            </label>
                            <select name="translationMode" class="form-control mb-4">
                                <option value="all">
                                    <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.translationMode.optionAll"/>
                                </option>
                                <option value="missingProperties">
                                    <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.translationMode.missingOnly"/>
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">
                                <core:icon identifier="actions-translate" size="small"/>
                                <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.Agencies.translateXlf.submit"/>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <f:render partial="Spinner" arguments="{messageKey: 'LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.general.spinner.contentCreation'}" />

</f:section>
