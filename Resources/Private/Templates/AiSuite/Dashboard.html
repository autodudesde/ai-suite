<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <h1 class="mb-3 fw-semibold">
        <core:icon identifier="tx-aisuite-extension" size="medium" />
        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.dashboard.header"/>
    </h1>

    <div class="row d-flex align-items-stretch">
        <f:if condition="{freeRequests} >= 0 && {paidRequests} >= 0 && {aboRequests} >= 0">
            <div class="col-md-6 d-flex">
                <div class="panel panel-default flex-fill">
                    <div class="panel-heading">
                        <label class="panel-title fw-bold">
                            <core:icon identifier="actions-store" />
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.dashboard.creditState"/>
                        </label>
                    </div>
                    <div class="panel-body">
                        <div class="request-state d-flex gap-2 my-1">
                        <span class="badge badge-warning">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.freeCredits"/>: {freeRequests} <small class="ms-1">(<f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.creditsRemaining" />)</small>
                        </span>
                            <span class="badge badge-warning">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.paidCredits"/>: {paidRequests} <small class="ms-1">(<f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.creditsRemaining" />)</small>
                        </span>
                            <f:if condition="{modelType} != ''">
                            <span class="badge badge-warning">
                                <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.aboCredits"/>: {aboRequests} <small class="ms-1">(<f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.creditsUsed" />)</small>
                            </span>
                            </f:if>
                        </div>
                    </div>
                </div>
            </div>
        </f:if>
        <div class="col-md-6 d-flex">
            <div class="panel panel-default flex-fill">
                <div class="panel-heading">
                    <label class="panel-title fw-bold">
                        <core:icon identifier="actions-link" />
                        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.quickStart" default="Quick Start" />
                    </label>
                </div>
                <div class="panel-body">
                    <div class="btn-group gap-3" role="group">
                        <f:link.external uri="https://www.autodudes.de/documentation/ai-suite/en/introduction" target="_blank" class="btn btn-primary">
                            <core:icon identifier="actions-document-view" />
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.openDocumentation"/>
                        </f:link.external>
                        <f:link.external uri="https://www.autodudes.de/en/account/login" target="_blank" class="btn btn-primary">
                            <core:icon identifier="actions-key" />
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.manageLicense"/>
                        </f:link.external>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <h2 class="mb-3 fw-semibold">
        <core:icon identifier="actions-system-tree-search-open" />
        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.dashboard.headerSections"/>
    </h2>

    <div class="d-flex flex-wrap gap-3 align-items-stretch">
        <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
            <f:render partial="DashboardCards/DynamicCard" arguments="{
                icon: 'actions-cog',
                cardname: 'globalSettingsSection',
                route: 'ai_suite_settings',
                status: 'active'
            }" />
        </div>

        <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
            <f:render partial="DashboardCards/DynamicCard" arguments="{
                icon: 'actions-play',
                cardname: 'workflowSection',
                route: 'ai_suite_workflow',
                status: 'active'
            }" />
        </div>

        <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
            <f:render partial="DashboardCards/DynamicCard" arguments="{
                icon: 'actions-clock',
                cardname: 'backgroundTaskSection',
                route: 'ai_suite_backgroundtask',
                status: 'active'
            }" />
        </div>

        <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
            <f:render partial="DashboardCards/DynamicCard" arguments="{
                icon: 'actions-cog-alt',
                cardname: 'manageGlobalInstructions',
                route: 'ai_suite_global_instructions',
                status: 'active'
            }" />
        </div>

        <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
            <f:render partial="DashboardCards/DynamicCard" arguments="{
                icon: 'actions-message-dots',
                cardname: 'managePromptTemplates',
                route: 'ai_suite_prompt',
                status: 'active'
            }" />
        </div>

        <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
            <f:render partial="DashboardCards/DynamicCard" arguments="{
                icon: 'actions-rocket',
                cardname: 'agencySection',
                route: 'ai_suite_agencies',
                status: 'active'
            }" />
        </div>

        <div class="d-flex" style="flex: 0 0 calc(50% - 0.75rem);">
            <div class="panel panel-default flex-fill">
                <div class="panel-heading">
                    <label class="panel-title fw-bold">
                        <core:icon identifier="actions-lightbulb-on" />
                        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.feedbackTitle"/>
                    </label>
                </div>
                <div class="panel-body">
                    <div class="mb-3">
                        <p>
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.feedbackDescription"/>
                        </p>
                    </div>
                    <div class="panel-actions">
                        <f:link.external uri="mailto:service@autodudes.de" target="_blank" class="btn btn-primary">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.feedbackBtn"/>
                        </f:link.external>
                    </div>
                </div>
            </div>
        </div>
    </div>
</f:section>
