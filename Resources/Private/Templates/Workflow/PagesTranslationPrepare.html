<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
      {namespace core=TYPO3\CMS\Core\ViewHelpers}
      {namespace be=TYPO3\CMS\Backend\ViewHelpers}

<f:layout name="Module"/>

<f:section name="Content">
    <f:asset.css identifier="backend-aisuite-sortable-styles" href="EXT:ai_suite/Resources/Public/Css/sortable.css" />

    <div class="row">
        <div class="col-12">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <label class="panel-title fw-bold">
                        <core:icon identifier="content-menu-pages" />
                        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.dashboard.card.workflowPagesTranslation.title"/>
                    </label>
                </div>
                <div class="panel-body">
                    <p class="mb-4">
                        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.dashboard.card.workflowPagesTranslation.description"/>
                    </p>
                    <form method="POST" action="pagesTranslationPrepareExecute" name="pagesTranslationPrepareExecute">
            <div class="row">
                <div class="col-md-4">
                    <f:render partial="Libs/PagesSelect" arguments="{pagesSelect: pagesSelect, propertyName: 'workflowPagesTranslationPrepare[startFromPid]', label: 'LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.preparePagesTranslation.pageChooser', selected: selectedPageId}" />
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="fw-bold mb-2">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.preparePagesTranslation.pageType"/>
                        </label>
                        <select name="workflowPagesTranslationPrepare[pageType]" class="form-select" id="pageType">
                            <f:for each="{pageTypes}" as="pageType" key="value">
                                <f:if condition="{preSelection} && {preSelection.pageType} == {value}">
                                    <f:then>
                                        <option value="{value}" selected="selected">{pageType}</option>
                                    </f:then>
                                    <f:else>
                                        <option value="{value}">{pageType}</option>
                                    </f:else>
                                </f:if>
                            </f:for>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="fw-bold mb-2">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.preparePagesTranslation.depth"/>
                        </label>
                        <select name="workflowPagesTranslationPrepare[depth]" class="form-select" id="depth">
                            <f:for each="{depths}" as="depth" key="value">
                                <f:if condition="{preSelection} && {preSelection.depth} == {value}">
                                    <f:then>
                                        <option value="{value}" selected="selected">{depth}</option>
                                    </f:then>
                                    <f:else>
                                        <option value="{value}">{depth}</option>
                                    </f:else>
                                </f:if>
                            </f:for>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="fw-bold mb-2">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.preparePagesTranslation.sourceLanguage"/>
                        </label>
                        <select name="workflowPagesTranslationPrepare[sourceLanguage]" class="form-select" id="sourceLanguage">
                            <f:for each="{sourceLanguages}" as="sourceLanguage" key="value">
                                <f:if condition="{preSelection} && {preSelection.sourceLanguage} == {value}">
                                    <f:then>
                                        <option value="{value}" selected="selected">{sourceLanguage}</option>
                                    </f:then>
                                    <f:else>
                                        <option value="{value}">{sourceLanguage}</option>
                                    </f:else>
                                </f:if>
                            </f:for>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="fw-bold mb-2">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.preparePagesTranslation.targetLanguage"/>
                        </label>
                        <select name="workflowPagesTranslationPrepare[targetLanguage]" class="form-select" id="targetLanguage">
                            <f:for each="{targetLanguages}" as="targetLanguage" key="value" iteration="iteration">
                                <f:if condition="{preSelection} && {preSelection.targetLanguage} == {value}">
                                    <f:then>
                                        <option value="{value}" selected="selected">{targetLanguage}</option>
                                    </f:then>
                                    <f:else>
                                        <f:if condition="{preSelection}">
                                            <f:then>
                                                <option value="{value}">{targetLanguage}</option>
                                            </f:then>
                                            <f:else>
                                                <f:if condition="{iteration.index} == 1 && {value} != '0'">
                                                    <f:then>
                                                        <option value="{value}" selected="selected">{targetLanguage}</option>
                                                    </f:then>
                                                    <f:else>
                                                        <option value="{value}">{targetLanguage}</option>
                                                    </f:else>
                                                </f:if>
                                            </f:else>
                                        </f:if>
                                    </f:else>
                                </f:if>
                            </f:for>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="fw-bold mb-2">
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.preparePagesTranslation.translationScope"/>
                        </label>
                        <select name="workflowPagesTranslationPrepare[translationScope]" class="form-select" id="translationScope">
                            <f:for each="{translationScopeOptions}" as="scopeOption" key="value">
                                <f:if condition="{preSelection} && {preSelection.translationScope} == {value}">
                                    <f:then>
                                        <option value="{value}" selected="selected">{scopeOption}</option>
                                    </f:then>
                                    <f:else>
                                        <option value="{value}">{scopeOption}</option>
                                    </f:else>
                                </f:if>
                            </f:for>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <input type="submit" class="btn btn-primary" value="{f:translate(key: 'LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.preparePagesTranslation.showPrepareResults')}" />
                </div>
            </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <section id="resultsToExecute">

    </section>
    <f:render partial="Spinner" arguments="{messageKey: 'LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.general.spinner.workflowPagesTranslation'}" />
</f:section>
</html>
