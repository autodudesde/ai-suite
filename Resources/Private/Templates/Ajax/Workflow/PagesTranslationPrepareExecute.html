<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers">
    {namespace core=TYPO3\CMS\Core\ViewHelpers}
    <div class="ai-suite" id="workflowPagesTranslationPrepareExecute">
        <div class="panel panel-default">
            <div class="panel-heading">
                <label class="panel-title fw-bold">
                    <core:icon identifier="actions-localize" />
                    <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.workflow.foundPagesForTranslation"/>
                </label>
            </div>
            <div class="panel-body">
                <f:if condition="{pages -> f:count()} > 0">
                    <f:then>
                    <f:render partial="Libs/SelectTextGenerationLibrary" arguments="{textGenerationLibraries: textTranslationLibraries, paidRequestsAvailable: paidRequestsAvailable}" />
                    <label class="mb-3 d-flex gap-2 fw-bold align-items-center">
                        <f:render partial="Libs/GlobalInstructions" arguments="{globalInstructions: globalInstructions}" />
                    </label>
                    <div class="glossary-selection" id="glossarySelection" style="display: none;"></div>
                    <label class="mb-3 d-flex gap-2 fw-bold">
                        <input type="checkbox" id="togglePageTranslationSelection" value="1" />
                        <span>
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.workflow.toggleAll"/>
                        </span>
                    </label>
                    <div id="sortable-pages-translation">
                        <f:render partial="Workflow/PageTranslationTask" arguments="{tasks: pages, alreadyPendingPages: alreadyPendingPages, translationScope: translationScope}" />
                    </div>

                <div class="d-flex">
                    <button class="btn btn-primary mt-4" type="submit" id="pagesTranslationExecuteFormSubmitBtn">
                        <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.workflow.translation.executeBtn"/>
                    </button>
                </div>
                        <p class="calculated-requests"></p>
                    </f:then>
                    <f:else>
                        <p>
                            <f:translate key="LLL:EXT:ai_suite/Resources/Private/Language/locallang_module.xlf:aiSuite.module.workflow.translation.noPagesFound"/>
                        </p>
                    </f:else>
                </f:if>
            </div>
        </div>
    </div>
</html>
